<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentez lastik yakında yayında!</title>

  <style>
    /* Reset default margins */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000; /* fallback background */
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Ensures image scales nicely */
      object-position: center;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.4); /* dark overlay */
    }

    .text {
      color: white;
      font-size: clamp(24px, 5vw, 60px);
      text-align: center;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="image.png" alt="Sentez lastik yakında yayında!">

    <div class="overlay">
      <div class="text">
        Coming Soon
      </div>
    </div>
  </div>
</body>
</html>
